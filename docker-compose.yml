services:
  postgres:
    image: postgres:16-alpine
    container_name: construction-progress-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-construction_progress}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${DB_NAME:-construction_progress}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: construction-progress-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: construction-progress-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-construction_progress}?sslmode=disable
      - STORAGE_ROOT=/storage
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
      - AI_SERVICE_URL=http://ai-service:8001
    volumes:
      - ./storage:/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    build:
      context: ./ai-service
      dockerfile: ../docker/ai-service.Dockerfile
    container_name: construction-progress-ai-service
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_ROOT=/storage
    volumes:
      - ./storage:/storage
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
